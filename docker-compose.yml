version: '3.8'

services:
  sql_server_demo:
    image: mcr.microsoft.com/mssql/server:latest
    container_name: sql_server_demo
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: ${SQL_SERVER_DEMO_SA_PASSWORD}
    ports:
      - "1433:1433" # Expose SQL Server on port 1433 for application database
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./ExpenseAnalyserDbScripts:/usr/src/app/sqlscripts
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P '$$SA_PASSWORD' -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - expense-network

  authenticationDB:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: authenticationDB
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: ${AUTH_DB_SA_PASSWORD}
    ports:
      - "1434:1433" # Expose SQL Server instance on port 1434 for authentication db management
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P '$$SA_PASSWORD' -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - expense-network
  
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - expense-network

  backend-server:
    image: expense-api:latest
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: backend-server
    ports:
      - "5223:80" # API is exposed on port 5223
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      # Database Connection Strings
      ConnectionStrings__ExpenseConnectionString: "Server=sql_server_demo,1433;Database=ExpenseAnalyserDb;User=sa;Password=${SQL_SERVER_DEMO_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true;"
      ConnectionStrings__ExpenseAuthConnectionString: "Server=authenticationDB,1433;Database=AuthenticationDb;User=sa;Password=${AUTH_DB_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true;"
      # Redis Connection String
      ConnectionStrings__Redis: "redis:6379"
      # AWS Configuration
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET_NAME: ${AWS_BUCKET}
      # JWT Configuration (default values, should be overridden in production)
      # Double-underscore names so they bind to configuration["Jwt:Key"] etc. in JwtConfig.cs
      Jwt__Key: "your-super-secret-jwt-key-that-is-at-least-32-characters-long"
      Jwt__Issuer: "ExpenseApi"
      Jwt__Audience: "ExpenseApiUsers"
    depends_on:
      sql_server_demo:
        condition: service_healthy
      redis:
        condition: service_healthy
      authenticationDB:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/swagger/index.html"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - expense-network

  frontend:
    image: expense-analyser:latest # Pre-build frontend image
    ports:
      - "8080:80" # Frontend exposed on port 8080
    environment:
      # nginx.conf proxies /api to this; without it nginx fails at boot
      # with: [emerg] unknown "backend_api_url" variable
      - BACKEND_API_URL=http://backend-server:80
    depends_on:
      - backend-server # Wait for API to be up
    networks:
      - expense-network

networks:
  expense-network:
    driver: bridge

volumes:
  sqlserver_data: 
